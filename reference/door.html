<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const W = c.width = window.innerWidth;
const H = c.height = window.innerHeight;
const cx = W / 2, cy = H / 2;

// ─── Seam Geometry ────────────────────────────────────────────────
const BX = 64, BY = H * 0.135;

// Upper spark path: origin (cx,cy) → top of screen
const UP = [
  { ax: cx,      ay: cy,      bx: cx+BX, by: cy-BY   },   // slant  ↗
  { ax: cx+BX,   ay: cy-BY,   bx: cx+BX, by: BY       },   // straight ↑
  { ax: cx+BX,   ay: BY,      bx: cx,    by: 0         }    // slant  ↖
];
// Lower spark path: origin (cx,cy) → bottom of screen (mirrored)
const DOWN = [
  { ax: cx,      ay: cy,      bx: cx-BX, by: cy+BY   },   // slant  ↙
  { ax: cx-BX,   ay: cy+BY,   bx: cx-BX, by: H-BY     },   // straight ↓
  { ax: cx-BX,   ay: H-BY,    bx: cx,    by: H         }    // slant  ↘
];

function segLen(s) { return Math.hypot(s.bx - s.ax, s.by - s.ay); }
function pathLen(p) { return p.reduce((a, s) => a + segLen(s), 0); }
function pointAt(path, t) {
  let rem = Math.max(0, Math.min(t, 1)) * pathLen(path);
  for (const s of path) {
    const l = segLen(s);
    if (rem <= l) {
      const f = l > 0 ? rem / l : 0;
      return { x: s.ax + (s.bx - s.ax) * f, y: s.ay + (s.by - s.ay) * f };
    }
    rem -= l;
  }
  const last = path[path.length - 1];
  return { x: last.bx, y: last.by };
}

// ─── Metal Texture (pre-render, called once) ──────────────────────
const metal = document.createElement('canvas');
metal.width = W; metal.height = H;
const mc = metal.getContext('2d');

(function buildMetal() {
  // Base horizontal gradient — dark gunmetal blue-grey
  const g = mc.createLinearGradient(0, 0, W, 0);
  g.addColorStop(0.00, '#28282e');
  g.addColorStop(0.12, '#3c3c44');
  g.addColorStop(0.28, '#343440');
  g.addColorStop(0.46, '#44444e');
  g.addColorStop(0.54, '#4a4a56');
  g.addColorStop(0.72, '#3a3a44');
  g.addColorStop(0.88, '#404048');
  g.addColorStop(1.00, '#262630');
  mc.fillStyle = g; mc.fillRect(0, 0, W, H);

  // Top/bottom darkness
  const vg = mc.createLinearGradient(0, 0, 0, H);
  vg.addColorStop(0,    'rgba(0,0,0,.55)');
  vg.addColorStop(0.18, 'rgba(0,0,0,.12)');
  vg.addColorStop(0.5,  'rgba(0,0,0,0)');
  vg.addColorStop(0.82, 'rgba(0,0,0,.12)');
  vg.addColorStop(1,    'rgba(0,0,0,.58)');
  mc.fillStyle = vg; mc.fillRect(0, 0, W, H);

  // Horizontal brush striations (deterministic, fast pseudo-noise)
  for (let y = 0; y < H; y++) {
    const n = (Math.sin(y * 127.1 + 311.7) * 43758.5453) % 1;
    const r = n < 0 ? n + 1 : n;
    const b = 120 + (r * 100) | 0;
    mc.strokeStyle = `rgba(${b},${b},${b + 5},${0.008 + r * 0.022})`;
    mc.lineWidth = 1;
    mc.beginPath(); mc.moveTo(0, y); mc.lineTo(W, y); mc.stroke();
  }

  // Faint vertical scratches
  for (const fx of [0.19, 0.44, 0.61, 0.78]) {
    const sx = fx * W;
    const sg = mc.createLinearGradient(sx, 0, sx, H);
    sg.addColorStop(0,   'rgba(180,180,190,0)');
    sg.addColorStop(0.3, 'rgba(180,180,190,.055)');
    sg.addColorStop(0.7, 'rgba(180,180,190,.055)');
    sg.addColorStop(1,   'rgba(180,180,190,0)');
    mc.strokeStyle = sg; mc.lineWidth = 1;
    mc.beginPath(); mc.moveTo(sx, 0); mc.lineTo(sx + 0.7, H); mc.stroke();
  }

  // Diagonal sheen
  const sh = mc.createLinearGradient(W * .22, 0, W * .62, H);
  sh.addColorStop(0,   'rgba(255,255,255,0)');
  sh.addColorStop(.42, 'rgba(255,255,255,.05)');
  sh.addColorStop(.50, 'rgba(255,255,255,.09)');
  sh.addColorStop(.58, 'rgba(255,255,255,.05)');
  sh.addColorStop(1,   'rgba(255,255,255,0)');
  mc.fillStyle = sh; mc.fillRect(0, 0, W, H);

  // Structural horizontal panel lines
  for (const fy of [.17, .39, .61, .83]) {
    const py = fy * H;
    mc.strokeStyle = 'rgba(0,0,0,.4)'; mc.lineWidth = 2;
    mc.beginPath(); mc.moveTo(0, py); mc.lineTo(W, py); mc.stroke();
    mc.strokeStyle = 'rgba(100,100,115,.2)'; mc.lineWidth = 1;
    mc.beginPath(); mc.moveTo(0, py + 2); mc.lineTo(W, py + 2); mc.stroke();
  }

  // Rust patches
  const rusts = [
    [.11,.16,.04,.54],[.84,.26,.03,.48],[.07,.74,.035,.44],
    [.88,.62,.028,.48],[.59,.07,.024,.42],[.23,.89,.032,.43],[.77,.84,.026,.40],
  ];
  for (const [fx,fy,fr,intensity] of rusts) {
    const rx = fx*W, ry = fy*H, rr = fr * Math.min(W,H);
    const rg = mc.createRadialGradient(rx,ry,0, rx,ry,rr);
    rg.addColorStop(0,   `rgba(138,62,14,${intensity})`);
    rg.addColorStop(.4,  `rgba(108,44,8,${intensity*.65})`);
    rg.addColorStop(.75, `rgba(84,32,4,${intensity*.3})`);
    rg.addColorStop(1,   'rgba(65,24,2,0)');
    mc.fillStyle = rg;
    mc.beginPath(); mc.arc(rx,ry,rr,0,Math.PI*2); mc.fill();
    // Rust specks around patch
    for (let i = 0; i < 9; i++) {
      const a = (Math.sin(i*127.1 + fx*311.7)*43758.5) % (Math.PI*2);
      const d = rr * (.55 + ((Math.cos(i*269.5 + fy*183.3)*43758.5) % 1 + 1) % 1 * 1.15);
      const pr = .8 + ((Math.sin(i*419.2 + fr*531.7)*43758.5) % 1 + 1) % 1 * 2.2;
      const rv = ((Math.cos(i*234.1)*43758.5) % 1 + 1) % 1;
      mc.fillStyle = `rgba(${110+(rv*40)|0},${28+(rv*22)|0},${5+(rv*12)|0},${.22 + rv*.32})`;
      mc.beginPath(); mc.arc(rx + Math.cos(a)*d, ry + Math.sin(a)*d, pr, 0, Math.PI*2); mc.fill();
    }
  }

  // Bolt heads
  const bolts = [
    [.035,.035],[.965,.035],[.035,.965],[.965,.965],
    [.035,.50],[.965,.50],[.50,.035],[.50,.965],
    [.26,.035],[.74,.035],[.26,.965],[.74,.965],
    [.035,.26],[.035,.74],[.965,.26],[.965,.74],
  ];
  const boltR = Math.min(W,H) * .009;
  for (const [fx,fy] of bolts) {
    const rx = fx*W, ry = fy*H;
    mc.save();
    mc.shadowColor = 'rgba(0,0,0,.65)'; mc.shadowBlur = 5;
    mc.shadowOffsetX = 1.5; mc.shadowOffsetY = 1.5;
    const bg = mc.createRadialGradient(rx-boltR*.3, ry-boltR*.35, 0, rx, ry, boltR);
    bg.addColorStop(0, '#7e7e8a'); bg.addColorStop(.5, '#4e4e5a'); bg.addColorStop(1, '#1e1e24');
    mc.fillStyle = bg;
    mc.beginPath(); mc.arc(rx,ry,boltR,0,Math.PI*2); mc.fill();
    mc.restore();
    mc.fillStyle = 'rgba(255,255,255,.13)';
    mc.beginPath(); mc.arc(rx-boltR*.25, ry-boltR*.3, boltR*.32, 0, Math.PI*2); mc.fill();
  }

  // Radial vignette
  const vig = mc.createRadialGradient(W/2,H/2,H*.22, W/2,H/2,H*.82);
  vig.addColorStop(0, 'rgba(0,0,0,0)'); vig.addColorStop(1, 'rgba(0,0,0,.6)');
  mc.fillStyle = vig; mc.fillRect(0, 0, W, H);
})();

// ─── Particles ────────────────────────────────────────────────────
let particles = [];
function addParticles(x, y, n = 3) {
  for (let i = 0; i < n; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = .8 + Math.random() * 3.5;
    particles.push({
      x, y,
      vx: Math.cos(ang) * spd,
      vy: Math.sin(ang) * spd - .5,
      life: 1,
      dec: .028 + Math.random() * .05,
      r: .6 + Math.random() * 1.6,
      warm: Math.random() > .45
    });
  }
}
function drawParticles() {
  particles = particles.filter(p => p.life > .02);
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    p.vy += .12; p.vx *= .97;
    p.life -= p.dec;
    const a = p.life * .85;
    ctx.save();
    ctx.globalAlpha = a;
    ctx.shadowColor = p.warm ? 'rgba(255,160,0,.6)' : 'rgba(255,220,80,.6)';
    ctx.shadowBlur = 5;
    ctx.fillStyle = p.warm ? `rgb(255,${(100 + p.life*120)|0},0)` : `rgb(255,${(200+p.life*55)|0},50)`;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life + .3, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// ─── Draw seam path up to progress t ─────────────────────────────
function drawSeam(path, t, alpha = 1) {
  if (t <= 0 || alpha <= 0) return;
  const total = pathLen(path);
  ctx.save(); ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  // Outer diffuse glow
  ctx.globalAlpha = alpha * .35;
  ctx.strokeStyle = 'rgba(255,110,10,1)';
  ctx.lineWidth = 10; ctx.shadowColor = 'rgba(255,130,0,.7)'; ctx.shadowBlur = 18;
  _strokePathT(path, t, total);

  // Mid glow
  ctx.globalAlpha = alpha * .65;
  ctx.strokeStyle = 'rgba(255,190,50,1)';
  ctx.lineWidth = 3.5; ctx.shadowBlur = 10;
  _strokePathT(path, t, total);

  // Bright core
  ctx.globalAlpha = alpha * .9;
  ctx.strokeStyle = 'rgba(255,248,210,1)';
  ctx.lineWidth = 1.2; ctx.shadowColor = 'rgba(255,240,150,.9)'; ctx.shadowBlur = 6;
  _strokePathT(path, t, total);

  ctx.restore();
}
function _strokePathT(path, t, total) {
  let rem = t * total;
  ctx.beginPath();
  ctx.moveTo(path[0].ax, path[0].ay);
  for (const s of path) {
    const l = segLen(s);
    if (rem <= 0) break;
    if (rem >= l) { ctx.lineTo(s.bx, s.by); rem -= l; }
    else {
      const f = rem / l;
      ctx.lineTo(s.ax + (s.bx - s.ax) * f, s.ay + (s.by - s.ay) * f);
      rem = 0;
    }
  }
  ctx.stroke();
}

// ─── Draw spark head ──────────────────────────────────────────────
function drawSparkHead(x, y, size = 1, alpha = 1) {
  ctx.save();
  ctx.globalAlpha = alpha;
  const og = ctx.createRadialGradient(x, y, 0, x, y, 28 * size);
  og.addColorStop(0,   'rgba(255,255,220,1)');
  og.addColorStop(.18, 'rgba(255,210,60,.85)');
  og.addColorStop(.5,  'rgba(255,100,10,.45)');
  og.addColorStop(1,   'rgba(255,40,0,0)');
  ctx.fillStyle = og;
  ctx.beginPath(); ctx.arc(x, y, 28 * size, 0, Math.PI*2); ctx.fill();
  ctx.shadowColor = 'rgba(255,200,80,.9)'; ctx.shadowBlur = 12;
  ctx.fillStyle = `rgba(255,255,255,${alpha})`;
  ctx.beginPath(); ctx.arc(x, y, 3.5 * size, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

// ─── Clip helpers for door panels ────────────────────────────────
// Seam polygon edge (top → bottom) shared by both panels
// Top of seam: UP[2].b = (cx, 0)
// Upper seam nodes (top→origin): UP reversed from-endpoints
// Lower seam nodes (origin→bottom): DOWN to-endpoints
function _buildSeamEdge() {
  const topX = UP[UP.length - 1].bx, topY = UP[UP.length - 1].by;
  ctx.lineTo(topX, topY);
  for (let i = UP.length - 1; i >= 0; i--) ctx.lineTo(UP[i].ax, UP[i].ay);
  for (const s of DOWN) ctx.lineTo(s.bx, s.by);
}
function clipLeft() {
  ctx.beginPath();
  ctx.moveTo(0, 0);
  _buildSeamEdge();
  ctx.lineTo(0, H);
  ctx.closePath(); ctx.clip();
}
function clipRight() {
  ctx.beginPath();
  ctx.moveTo(W, 0);
  _buildSeamEdge();
  ctx.lineTo(W, H);
  ctx.closePath(); ctx.clip();
}

// ─── Easing ───────────────────────────────────────────────────────
const ease   = t => t < .5 ? 2*t*t : -1+(4-2*t)*t;
const easeIn = t => t * t * t;

// ─── Animation state ──────────────────────────────────────────────
const PHASE = { WAIT:0, IGNITE:1, SEAM:2, FLASH:3, OPEN:4, DONE:5 };
const DUR   = [500,    500,     2300,    280,     1700,    0];
let phase = PHASE.WAIT, phaseStart = null;

function phaseT(ts) {
  return phaseStart ? Math.min((ts - phaseStart) / (DUR[phase] || 1), 1) : 0;
}

// ─── Main render loop ─────────────────────────────────────────────
function frame(ts) {
  if (phaseStart === null) phaseStart = ts;
  const t = phaseT(ts);

  // Black backdrop
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);

  if (phase === PHASE.WAIT) {
    ctx.drawImage(metal, 0, 0);
    if (t >= 1) { phase = PHASE.IGNITE; phaseStart = ts; }

  } else if (phase === PHASE.IGNITE) {
    ctx.drawImage(metal, 0, 0);
    const intens = ease(t);
    const flicker = .85 + Math.sin(ts * .055) * .15;
    drawSparkHead(cx, cy, .6 + intens * .8, intens * flicker);
    if (Math.random() < .6) addParticles(cx, cy, 2);
    drawParticles();
    if (t >= 1) { phase = PHASE.SEAM; phaseStart = ts; }

  } else if (phase === PHASE.SEAM) {
    ctx.drawImage(metal, 0, 0);

    // Use a curve that accelerates then settles
    const sp = ease(t);

    drawSeam(UP,   sp);
    drawSeam(DOWN, sp);

    const uPos = pointAt(UP,   sp);
    const dPos = pointAt(DOWN, sp);

    drawSparkHead(uPos.x, uPos.y, .85);
    drawSparkHead(dPos.x, dPos.y, .85);

    if (Math.random() < .7) addParticles(uPos.x, uPos.y, 2);
    if (Math.random() < .7) addParticles(dPos.x, dPos.y, 2);
    drawParticles();

    if (t >= 1) { phase = PHASE.FLASH; phaseStart = ts; }

  } else if (phase === PHASE.FLASH) {
    ctx.drawImage(metal, 0, 0);
    drawSeam(UP,   1);
    drawSeam(DOWN, 1);

    // Flash burst
    const ft = Math.sin(t * Math.PI);
    ctx.save();
    ctx.globalAlpha = ft * .45;
    ctx.fillStyle = 'rgba(255,215,90,1)';
    ctx.fillRect(0, 0, W, H);
    ctx.restore();

    drawParticles();
    if (t >= 1) { phase = PHASE.OPEN; phaseStart = ts; }

  } else if (phase === PHASE.OPEN) {
    // ease-in so the heavy door starts with weight, then gains momentum
    const op = easeIn(t);
    const slide = op * (W * .55 + 240);

    // Left panel sliding left
    ctx.save();
    ctx.translate(-slide, 0);
    clipLeft();
    ctx.drawImage(metal, 0, 0);
    ctx.restore();

    // Right panel sliding right
    ctx.save();
    ctx.translate(slide, 0);
    clipRight();
    ctx.drawImage(metal, 0, 0);
    ctx.restore();

    // Crack glow at original seam position (fades as gap widens)
    const crackAlpha = Math.max(0, 1 - t * 2.2);
    if (crackAlpha > 0) {
      drawSeam(UP,   1, crackAlpha);
      drawSeam(DOWN, 1, crackAlpha);
    }

    // Ambient light spilling from the gap (bright line along seam)
    if (t < .45) {
      ctx.save();
      ctx.globalAlpha = (1 - t * 2.2) * .55;
      ctx.shadowColor = 'rgba(255,180,50,.9)';
      ctx.shadowBlur = 30 + slide * .08;
      ctx.strokeStyle = 'rgba(255,230,140,.7)';
      ctx.lineWidth = 1.5;
      // Draw full seam in one path
      ctx.beginPath();
      ctx.moveTo(UP[UP.length-1].bx, UP[UP.length-1].by);
      for (let i = UP.length-1; i >= 0; i--) ctx.lineTo(UP[i].ax, UP[i].ay);
      for (const s of DOWN) ctx.lineTo(s.bx, s.by);
      ctx.stroke();
      ctx.restore();
    }

    drawParticles();
    if (t >= 1) { phase = PHASE.DONE; phaseStart = ts; }

  } else {
    // Done — black remains
  }

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
